<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MTProxy Admin</title>
  <style>
    body{font-family:system-ui,sans-serif;margin:0;padding:20px;background:#f5f7fa}
    .container{max-width:1000px;margin:auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    h1,h2{margin-top:0} table{width:100%;border-collapse:collapse;margin:10px 0}
    th,td{padding:10px;text-align:left;border-bottom:1px solid #eee} tr:hover{background:#f8f9fa}
    .btn{padding:8px 12px;border:none;border-radius:4px;cursor:pointer;background:#007bff;color:#fff;margin-right:5px}
    .btn.red{background:#dc3545} .form-row{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap}
    input,select{padding:8px;border:1px solid #ccc;border-radius:4px;flex:1;min-width:120px}
    .status-ok{color:#28a745;font-weight:bold} .status-fail{color:#dc3545}
  </style>
</head>
<body>
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h1>🌐 MTProxy Dynamic Relay</h1>
    <a href="/logout" class="btn red">Выйти</a>
  </div>
  <h2>📦 Списки прокси</h2>
  <div class="form-row" id="listForm">
    <input name="name" placeholder="Название" required>
    <input name="port" type="number" placeholder="Порт" min="1024" max="65535" required>
    <button class="btn" onclick="addList()">Создать</button>
  </div>
  <table id="listsTable"></table>

  <h2>🔗 Прокси</h2>
  <div class="form-row" id="proxyForm">
    <select name="list_id" required></select>
    <input name="host" placeholder="IP или домен" required>
    <input name="port" type="number" placeholder="Порт" required>
    <input name="secret" placeholder="Secret" required>
    <button class="btn" onclick="addProxy()">Добавить</button>
  </div>
  <table id="proxiesTable"></table>
</div>
<script>
  const api='/api';
  async function load(){
    const [l,p,s]=await Promise.all([
      fetch(api+'/lists').then(r=>r.json()),
      fetch(api+'/proxies').then(r=>r.json()),
      fetch(api+'/status').then(r=>r.json())
    ]);
    document.getElementById('listsTable').innerHTML=`<tr><th>ID</th><th>Имя</th><th>Порт</th><th>Лучший</th><th>RTT</th><th>Действие</th></tr>`+
      l.map(x=>`<tr><td>${x.id}</td><td>${x.name}</td><td>${x.port}</td>
      <td>${(s[x.id]?.host||'—')}</td><td>${(s[x.id]?.rtt||'—')}ms</td>
      <td><button class="btn red" onclick="delList(${x.id})">Удалить</button></td></tr>`).join('');
    document.getElementById('proxiesTable').innerHTML=`<tr><th>List</th><th>Host:Port</th><th>RTT</th><th>Статус</th><th></th></tr>`+
      p.map(x=>`<tr><td>${x.list_id}</td><td>${x.host}:${x.port}</td><td>${x.rtt}ms</td>
      <td class="status-${x.status}">${x.status}</td>
      <td><button class="btn red" onclick="delProxy(${x.id})">✖</button></td></tr>`).join('');
    document.getElementById('listForm').querySelector('select')?.remove()
    const sel=document.getElementById('proxyForm').querySelector('select')
    sel.innerHTML=l.map(x=>`<option value="${x.id}">${x.name} (:${x.port})</option>`).join('')
  }
  async function addList(){
    const f=document.getElementById('listForm');
    await fetch(api+'/lists',{method:'POST',body:new FormData(f)});
    f.reset(); load();
  }
  async function addProxy(){
    const f=document.getElementById('proxyForm');
    await fetch(api+'/proxies',{method:'POST',body:new FormData(f)});
    f.querySelector('input').value=''; load();
  }
  async function delList(id){ if(confirm('Удалить список и все прокси?')){await fetch(`${api}/lists?id=${id}`,{method:'DELETE'});load();}}
  async function delProxy(id){ await fetch(`${api}/proxies?id=${id}`,{method:'DELETE'});load();}
  setInterval(load,3000); load();
</script>
</body>
</html>
